<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DanieWatch — Open in App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 48px 32px;
      max-width: 400px;
      width: 90%;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .app-name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #E91E63, #FF5252);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .title-preview {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 6px;
    }
    .type-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(233, 30, 99, 0.15);
      color: #E91E63;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }
    .open-btn {
      display: inline-block;
      padding: 16px 48px;
      background: linear-gradient(135deg, #E91E63, #C2185B);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(233, 30, 99, 0.3);
    }
    .open-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(233, 30, 99, 0.4); }
    .fallback {
      margin-top: 24px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #E91E63;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 24px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎬</div>
    <div class="app-name">DanieWatch</div>
    <div class="subtitle">Stream. Download. Enjoy.</div>

    <div id="loading">
      <div class="spinner"></div>
      <div id="status">Opening in app…</div>
    </div>

    <div id="fallback" class="hidden">
      <div class="title-preview" id="content-title">Opening content…</div>
      <div class="type-badge" id="content-type"></div>
      <br/>
      <a href="#" class="open-btn" id="open-btn">Open in DanieWatch</a>
      <p class="fallback">If the app doesn't open, make sure DanieWatch is installed on your device.</p>
    </div>
  </div>

  <script>
    (function() {
      // Parse path: /movie/123 or /tv/456
      const parts = window.location.pathname.split('/').filter(Boolean);
      const mediaType = parts[0]; // 'movie' or 'tv'
      const id = parts[1];        // TMDB ID

      if (!mediaType || !id) {
        document.getElementById('status').textContent = 'Invalid link';
        return;
      }

      // Build the custom scheme deep link for the app
      const appLink = 'daniewatch://' + mediaType + '/' + id;

      // Update UI
      const label = mediaType === 'tv' ? 'TV Show' : 'Movie';
      document.getElementById('content-type').textContent = label;
      document.getElementById('content-title').textContent = 'View this ' + label + ' in DanieWatch';
      document.getElementById('open-btn').href = appLink;

      // Try to open the app immediately via intent
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = appLink;
      document.body.appendChild(iframe);

      // If the app doesn't open within 1.5s, show the fallback button
      setTimeout(function() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('fallback').classList.remove('hidden');
      }, 1500);
    })();
  </script>
</body>
</html>
